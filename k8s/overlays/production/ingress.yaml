apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: k8s-graph-explorer
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - k8s-graph.example.com
        - api.k8s-graph.example.com
      secretName: k8s-graph-tls
  rules:
    - host: k8s-graph.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dashboard
                port:
                  number: 3000
    - host: api.k8s-graph.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
