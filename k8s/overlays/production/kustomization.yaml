apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: k8s-graph-explorer

resources:
  - ../../base
  - ingress.yaml

patches:
  - path: patches/backend-deployment.yaml
  - path: patches/dashboard-deployment.yaml
  - path: patches/neo4j-statefulset.yaml

configMapGenerator:
  - name: app-config
    literals:
      - ENVIRONMENT=production

