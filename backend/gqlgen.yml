# gqlgen configuration
# https://gqlgen.com/config/

# Where are all the schema files located?
schema:
  - graph/*.graphqls

# Where should the generated server code go?
exec:
  filename: graph/generated/generated.go
  package: generated

# Where should any generated models go?
model:
  filename: graph/model/models_gen.go
  package: model

# Where should the resolver implementations go?
resolver:
  layout: follow-schema
  dir: graph
  package: graph
  filename_template: "{name}.resolvers.go"
  omit_template_comment: true

# Custom scalar mappings
models:
  ID:
    model:
      - github.com/99designs/gqlgen/graphql.ID
      - github.com/99designs/gqlgen/graphql.Int
      - github.com/99designs/gqlgen/graphql.Int64
      - github.com/99designs/gqlgen/graphql.Int32
  Int:
    model:
      - github.com/99designs/gqlgen/graphql.Int
      - github.com/99designs/gqlgen/graphql.Int64
      - github.com/99designs/gqlgen/graphql.Int32
  Time:
    model:
      - github.com/99designs/gqlgen/graphql.Time
  Map:
    model:
      - github.com/99designs/gqlgen/graphql.Map
  Node:
    model:
      - github.com/K8S-Graph-Explorer/backend/graph/model.Node
  Edge:
    model:
      - github.com/K8S-Graph-Explorer/backend/graph/model.Edge
  Topology:
    model:
      - github.com/K8S-Graph-Explorer/backend/graph/model.Topology
  DependencyGraph:
    model:
      - github.com/K8S-Graph-Explorer/backend/graph/model.DependencyGraph
  NodeType:
    model:
      - github.com/K8S-Graph-Explorer/backend/graph/model.NodeType
  EdgeType:
    model:
      - github.com/K8S-Graph-Explorer/backend/graph/model.EdgeType
  DependencyDirection:
    model:
      - github.com/K8S-Graph-Explorer/backend/graph/model.DependencyDirection
  EventType:
    model:
      - github.com/K8S-Graph-Explorer/backend/graph/model.EventType
  TopologyStatistics:
    model:
      - github.com/K8S-Graph-Explorer/backend/graph/model.TopologyStatistics
  TopologyFilter:
    model:
      - github.com/K8S-Graph-Explorer/backend/graph/model.TopologyFilter
  DependencyFilter:
    model:
      - github.com/K8S-Graph-Explorer/backend/graph/model.DependencyFilter
  NodeInput:
    model:
      - github.com/K8S-Graph-Explorer/backend/graph/model.NodeInput
  EdgeInput:
    model:
      - github.com/K8S-Graph-Explorer/backend/graph/model.EdgeInput
  SyncResult:
    model:
      - github.com/K8S-Graph-Explorer/backend/graph/model.SyncResult
  TopologyEvent:
    model:
      - github.com/K8S-Graph-Explorer/backend/graph/model.TopologyEvent
  NodeEvent:
    model:
      - github.com/K8S-Graph-Explorer/backend/graph/model.NodeEvent

# Omit getters for model fields
omit_getters: true
