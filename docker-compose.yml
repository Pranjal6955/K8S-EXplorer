networks:
  k8s-graph-network:
    driver: bridge

volumes:
  neo4j-data:
  neo4j-logs:

services:
  # Neo4j Graph Database
  neo4j:
    image: neo4j:5.17.0-community
    container_name: k8s-graph-neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-password123}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
      - ./neo4j/neo4j.conf:/conf/neo4j.conf:ro
    networks:
      - k8s-graph-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Go Backend
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: k8s-graph-backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password123}
      - NEO4J_DATABASE=neo4j
      - IN_CLUSTER=false
    volumes:
      - ~/.kube/config:/root/.kube/config:ro
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - k8s-graph-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Next.js Dashboard
  dashboard:
    build:
      context: ../dashboard
      dockerfile: ../docker/dashboard/Dockerfile
    container_name: k8s-graph-dashboard
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_GRAPHQL_ENDPOINT=http://localhost:8080/graphql
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - k8s-graph-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
